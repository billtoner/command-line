# Pre-commit hooks for this repo.
#
# Install once on a fresh clone:
#   pre-commit install
#
# Run manually on every file (for an existing checkout):
#   pre-commit run --all-files
#
# This is a docs / notes repo — no Python code, no tests. The only gate
# that earns its keep is secret scanning, because tool notes and workflows
# routinely describe credential formats (glpat-…, AKIA…, ghp_…) and it's
# easy to paste a real one by accident.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
